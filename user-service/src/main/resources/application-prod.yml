spring:
  datasource:
	url: ${DB_URL}
	username: ${DB_USERNAME}
	password: ${DB_PASSWORD}
  data:
	redis:
	  host: ${REDIS_HOST}
	  port: ${REDIS_PORT:6379}
  kafka:
	bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

eureka:
  client:
	service-url:
	  defaultZone: ${EUREKA_DEFAULT_ZONE:http://discovery-service:8761/eureka/}

